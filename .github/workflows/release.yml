name: Release to RubyGems

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # Needed to create GitHub Release
  id-token: write # Needed for Trusted Publishing to RubyGems

jobs:
  test:
    name: Verify Stability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.4"
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec

  release:
    name: Build & Publish
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.4"
          bundler-cache: true

      - name: Build gem
        run: gem build console_kit.gemspec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: console_kit-*.gem
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
